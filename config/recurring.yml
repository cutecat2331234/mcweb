production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  expire_pending_orders:
    class: Commerce::ExpirePendingOrdersJob
    queue: maintenance
    schedule: every 15 minutes
  abandoned_cart_reminders:
    class: Commerce::AbandonedCartReminderJob
    queue: mailers
    schedule: at 10am every day
  forum_digest:
    class: Community::ForumDigestJob
    queue: mailers
    schedule: at 8am every day
  publish_scheduled_topics:
    class: Community::PublishScheduledTopicsJob
    queue: default
    schedule: every 5 minutes
  close_scheduled_topics:
    class: Community::CloseScheduledTopicsJob
    queue: default
    schedule: every 5 minutes
